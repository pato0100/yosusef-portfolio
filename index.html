<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Youssef Mahmoud — Personal Portfolio" />
    <link rel="icon" href="/assets/favicon.svg" />

    <!-- Fonts: Inter + Cairo (AR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Youssef Mahmoud | Portfolio</title>

    <!-- ✅ Dark Theme only -->
    <script>
  (function () {
    try {
      const savedTheme = localStorage.getItem('theme');
      const savedLang  = localStorage.getItem('lang');

      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.documentElement.classList.toggle('dark', savedTheme === 'dark');
      }

      if (savedLang) {
        document.documentElement.setAttribute('lang', savedLang);
        document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
      }
    } catch (e) {}
  })();
</script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
